name: 🇷🇺 Russia News Watcher

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 minutes
  workflow_dispatch:          # déclenchement manuel possible

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Restaurer le cache des articles déjà vus
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: Installer Python et les dépendances
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les paquets
        run: pip install feedparser requests

      - name: Lancer la surveillance
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rss_watcher.py

      - name: Sauvegarder les articles traités
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
